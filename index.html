<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Preventivi Tuega</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface2: #f9fafb;
      --border: #e5e7eb;
      --radius: 10px;
      --radius-sm: 6px;
      --text1: #111827;
      --text2: #4b5563;
      --text3: #9ca3af;
      --blue-bg: #e0f2fe;
      --blue-text: #0369a1;
      --blue-border: #7dd3fc;
      --green-bg: #dcfce7;
      --green-text: #166534;
      --green-border: #86efac;
      --red-bg: #fee2e2;
      --red-text: #b91c1c;
      --red-border: #fecaca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text1);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: #111827;
      color: #e5e7eb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .topbar img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }
    .topbar-title {
      font-weight: 600;
      font-size: 16px;
    }
    .topbar-spacer { flex: 1; }
    .topbar-status {
      font-size: 12px;
      color: var(--text3);
    }
    .topbar button {
      margin-left: 8px;
    }
    .container {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 24px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
      padding: 16px 18px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text1);
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-sm { font-size: 12px; padding: 4px 10px; }
    .btn-primary {
      background: #2563eb;
      border-color: #1d4ed8;
      color: #f9fafb;
    }
    .btn-danger {
      background: #ef4444;
      border-color: #b91c1c;
      color: #fef2f2;
    }
    .btn-green {
      background: #16a34a;
      border-color: #15803d;
      color: #ecfdf5;
    }
    .inp {
      width: 100%;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 13px;
      outline: none;
      background: var(--surface);
      color: var(--text1);
    }
    .inp:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37,99,235,0.25);
    }
    .lbl {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
      display: block;
    }
    .frow { margin-bottom: 10px; }
    .frow2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    textarea.inp {
      border-radius: var(--radius-sm);
      resize: vertical;
      min-height: 80px;
    }
    .empty {
      text-align: center;
      padding: 24px 0;
      color: var(--text3);
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    thead th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      background: var(--surface2);
    }
    tbody tr:hover {
      background: #f3f4ff;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
    .muted { color: var(--text2); }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .badge.bozza {
      background: #e5e7eb;
      color: #374151;
    }
    .badge.inviata {
      background: var(--blue-bg);
      color: var(--blue-text);
      border: 1px solid var(--blue-border);
    }
    .badge.accettata {
      background: var(--green-bg);
      color: var(--green-text);
      border: 1px solid var(--green-border);
    }
    .badge.rifiutata {
      background: var(--red-bg);
      color: var(--red-text);
      border: 1px solid var(--red-border);
    }
    .clickable { cursor: pointer; }
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: #f9fafb;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      z-index: 50;
    }
    .editor-wrap {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 24px 24px;
    }
    .editor-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .editor-top h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0;
      flex: 1;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.3fr);
      gap: 16px;
      align-items: flex-start;
    }
    .sec-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .sec-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .add-btn {
      border-radius: 999px;
      border: 1px dashed var(--border);
      background: #f9fafb;
      color: #2563eb;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 6px;
    }
    .prev-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
      padding: 10px 12px;
    }
    .prev-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    .prev-body {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #f9fafb;
      padding: 10px;
      max-height: 80vh;
      overflow: auto;
    }
    .preview-sticky {
      position: sticky;
      top: 70px;
    }
    .voce-box {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .voce-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .voce-num {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
    }
    .voce-del {
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
    }
    .img-prev {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .img-ph {
      width: 90px;
      height: 90px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      text-align: center;
      color: var(--text3);
      cursor: pointer;
    }
    .grid-sub {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 1fr) minmax(0, 1.4fr) 32px;
      gap: 6px;
      align-items: center;
      font-size: 12px;
    }
    .sub-hd {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .sub-row { margin-bottom: 4px; }
    .sub-del {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 14px;
      padding: 0;
    }
    .acc-section {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
    }
    .acc-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .cond-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 2fr) 24px;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }
    .cat-item {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 3fr) minmax(0, 1.4fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 6px;
      background: var(--surface2);
    }
    .cat-item:hover { background: #eef2ff; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px rgba(15,23,42,0.35);
      padding: 16px 18px;
      max-width: 420px;
      width: 100%;
    }
    .modal h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }
    .rte-wrap {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      padding: 6px;
    }
    .rte-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .rte-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .rte-color {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .rte-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 4px;
    }
    .rte-editor {
      min-height: 100px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.6;
      border-radius: var(--radius-sm);
      background: var(--surface);
      overflow-y: auto;
    }
    .rte-editor:empty:before {
      content: attr(data-placeholder);
      color: var(--text3);
      pointer-events: none;
    }
    .pick-item {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 8px 10px;
      background: var(--surface2);
      cursor: pointer;
    }
    .pick-item:hover { background: #eef2ff; }
    .pick-code {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pick-desc {
      font-size: 12px;
      color: var(--text2);
    }

    /* PDF layout */
    #pdf-doc {
      font-size: 9px;
      line-height: 1.4;
      color: #111827;
    }
    .ph {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .ph-logo {
      width: 90px;
      height: auto;
      object-fit: contain;
    }
    .ph-az {
      font-size: 7.5px;
      line-height: 1.4;
    }
    .pm {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 9px;
    }
    .pm-cn { font-weight: 600; }
    .pnum {
      margin-bottom: 6px;
      font-size: 10px;
      font-weight: 600;
      text-align: right;
    }
    .pogg {
      margin-bottom: 6px;
      font-size: 10px;
    }
    .piva {
      font-size: 8px;
      margin-bottom: 6px;
      font-style: italic;
    }
    .psec {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 4px 6px;
      background: #f3f4f6;
      border-radius: 4px;
      margin: 6px 0;
    }
    .pimg {
      width: 90px;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      margin-top: 4px;
    }
    .cod {
      font-size: 9px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ptab {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      margin-top: 6px;
      font-size: 8.5px;
    }
    .ptab th,
    .ptab td {
      border: 1px solid #dddddd;
      padding: 4px 5px;
      vertical-align: top;
      word-wrap: break-word;
      word-break: break-word;
    }
    .ptab thead th {
      background: #f3f4f6;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .ptab .r { text-align: right; }
    .ptot td {
      font-weight: 700;
      background: #f3f4f6;
    }
    .pcond {
      margin-top: 10px;
      font-size: 8.5px;
    }
    .pcond-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 2fr);
      gap: 4px 8px;
    }
    .pcond-row {
      display: contents;
    }
    .pcond-lbl {
      font-weight: 600;
    }
    .pfirma {
      margin-top: 12px;
      font-size: 9px;
      text-align: right;
    }
    .pfirma-nome {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .pfirma-ruolo {
      font-size: 8px;
      color: #6b7280;
    }
    .pfoot {
      margin-top: 10px;
      font-size: 7.5px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 900px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }
      .preview-sticky {
        position: static;
      }
    }
    @media (max-width: 600px) {
      .container,
      .editor-wrap {
        padding: 0 16px 16px;
      }
      .topbar {
        padding: 8px 16px;
      }
    }
    @media print {
      .ptab {
        table-layout: auto !important;
        width: 100% !important;
      }
      .ptab td,
      .ptab th {
        max-width: none !important;
        word-wrap: break-word !important;
        word-break: break-word !important;
        border: 1px solid #ddd !important;
        padding: 4px 5px !important;
      }
      .ptab tr {
        page-break-inside: avoid !important;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="topbar">
  <img src="logo.png" alt="Logo">
  <div class="topbar-title">Gestione preventivi</div>
  <div class="topbar-spacer"></div>
  <span style="font-size:12px;">Stato connessione: <span id="conn-status">...</span></span>
  <button class="btn btn-sm" id="btn-catalogo">Catalogo</button>
</div>

<!-- LIST -->
<div id="view-list" class="container" style="display:none;">
  <div class="toolbar">
    <input class="inp" type="text" id="search" placeholder="Cerca cliente, oggetto, numero..." style="max-width:280px;">
    <select class="inp" id="filter-stato" style="max-width:160px;cursor:pointer;">
      <option value="">Tutti gli stati</option>
      <option value="bozza">Bozza</option>
      <option value="inviata">Inviata</option>
      <option value="accettata">Accettata</option>
      <option value="rifiutata">Rifiutata</option>
    </select>
    <button class="btn btn-primary" id="btn-nuovo">+ Nuovo preventivo</button>
  </div>
  <div class="card">
    <div id="list-wrap"><div class="empty">Caricamento...</div></div>
  </div>
</div>

<!-- CATALOGO -->
<div id="view-catalogo" style="display:none;" class="container">
  <div class="toolbar">
    <button class="btn btn-sm" id="btn-cat-back">&#8592; Lista preventivi</button>
    <span style="font-size:16px;font-weight:600;flex:1;">Catalogo prodotti</span>
    <button class="btn btn-primary" id="btn-cat-nuovo">+ Nuovo prodotto</button>
  </div>
  <div class="card">
    <div id="cat-wrap"><div class="empty">Caricamento...</div></div>
  </div>
</div>

<!-- EDITOR -->
<div id="view-editor" style="display:none;">
  <div class="editor-wrap">
    <div class="editor-top">
      <button class="btn btn-sm" id="btn-back">&#8592; Lista</button>
      <h1 id="editor-title">Nuovo preventivo</h1>
      <button class="btn btn-sm" id="btn-stato">Stato</button>
      <button class="btn btn-primary btn-sm" id="btn-salva">Salva</button>
      <button class="btn btn-sm" id="btn-pdf">&#11015; PDF</button>
    </div>
    <div class="editor-grid">
      <div>
        <div class="sec-card">
          <div class="sec-title">Intestazione</div>
          <div class="frow2">
            <div class="frow"><label class="lbl">Numero offerta</label><input class="inp" type="text" id="e-numero" placeholder="es. 26/0228"></div>
            <div class="frow"><label class="lbl">Data</label><input class="inp" type="date" id="e-data"></div>
          </div>
          <div class="frow"><label class="lbl">Oggetto</label><input class="inp" type="text" id="e-oggetto" placeholder="es. OFFERTA VARCHI EASYGATE ELITE S 1500"></div>
        </div>
        <div class="sec-card">
          <div class="sec-title">Cliente</div>
          <div class="frow2">
            <div class="frow"><label class="lbl">Ragione sociale</label><input class="inp" type="text" id="e-cnome" placeholder="es. DEFA SRL"></div>
            <div class="frow"><label class="lbl">Referente (C.A.)</label><input class="inp" type="text" id="e-cref" placeholder="es. Dott.ssa Vinto"></div>
          </div>
          <div class="frow"><label class="lbl">Indirizzo</label><input class="inp" type="text" id="e-cind" placeholder="Via..."></div>
          <div class="frow2">
            <div class="frow"><label class="lbl">CAP e Citta</label><input class="inp" type="text" id="e-ccitta" placeholder="80133 Napoli"></div>
            <div class="frow"><label class="lbl">Telefono</label><input class="inp" type="text" id="e-ctel" placeholder="081..."></div>
          </div>
          <div class="frow"><label class="lbl">Email</label><input class="inp" type="text" id="e-cemail" placeholder="email@..."></div>
        </div>
        <div class="sec-card">
          <div class="sec-title">Sezioni e prodotti</div>
          <div id="sezioni-wrap"></div>
          <button class="add-btn" id="btn-add-sezione">+ Aggiungi sezione</button>
        </div>
        <div class="sec-card">
          <div class="sec-title">Condizioni di fornitura</div>
          <div id="cond-wrap"></div>
          <button class="add-btn" id="btn-add-cond">+ Aggiungi voce</button>
        </div>
        <div class="sec-card">
          <div class="sec-title">Chiusura e firma</div>
          <div class="frow"><label class="lbl">Testo finale</label><textarea class="inp" id="e-tfine" rows="3">Restando a vostra completa disposizione, vi invitiamo a contattarci subito e senza impegno, per eventuali chiarimenti si rendessero necessari, nel contempo porgiamo i nostri migliori saluti.</textarea></div>
          <div class="frow2">
            <div class="frow"><label class="lbl">Nome firma</label><input class="inp" type="text" id="e-fnome" value="Mario Codarini"></div>
            <div class="frow"><label class="lbl">Ruolo</label><input class="inp" type="text" id="e-fruolo" value="Direzione commerciale"></div>
          </div>
        </div>
      </div>
      <div class="preview-sticky">
        <div class="prev-card">
          <div class="prev-hd">
            <span>Anteprima</span>
            <button class="btn btn-sm" id="btn-pdf2">&#11015; PDF</button>
          </div>
          <div class="prev-body"><div id="pdf-doc"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL STATO -->
<div class="overlay" id="stato-overlay" style="display:none;">
  <div class="modal">
    <h2>Cambia stato</h2>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn" id="btn-s-bozza">Bozza</button>
      <button class="btn" id="btn-s-inviata" style="background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);">Inviata</button>

  // ---- SEZIONI ----
  function renderSezioni() {
    var wrap = document.getElementById("sezioni-wrap");

  }

  function buildSezioneEl(si) {

  function renderVoci(si, wrapEl) {
    var wrap = wrapEl || document.getElementById("voci-" + si);
    if (!wrap) return;
    wrap.innerHTML = "";
    (sezioni[si].voci || []).forEach(function(v, vi) { wrap.appendChild(buildVoceEl(si, vi)); });

    var imgRow = document.createElement("div"); imgRow.style.cssText = "display:flex;gap:10px;margin-bottom:.6rem;";

    var addSubBtn = document.createElement("button");

  function buildSubRow(si, vi, idx, isAcc) {

    document.getElementById("cat-modal-title").textContent = "Nuovo prodotto";
    document.getElementById("cat-codice").value = "";
    var edNew = document.getElementById("cat-desc-editor"); if(edNew) edNew.innerHTML = "";
    document.getElementById("cat-prezzo").value = "";
    document.getElementById("cat-btn-del").style.display = "none";
    document.getElementById("cat-overlay").style.display = "flex";
    setTimeout(function() { document.getElementById("cat-codice").focus(); }, 50);
  }

  function openCatEdit(id) {
    var c = catalogo.find(function(x) { return x.id === id; }); if (!c) return;
    catEditId = id;
    document.getElementById("cat-modal-title").textContent = "Modifica prodotto";
    document.getElementById("cat-codice").value = c.codice || "";
    var edEdit = document.getElementById("cat-desc-editor"); if(edEdit) edEdit.innerHTML = c.descrizione || "";
    document.getElementById("cat-prezzo").value = c.prezzo_default != null ? c.prezzo_default : "";
    document.getElementById("cat-btn-del").style.display = "";
    document.getElementById("cat-overlay").style.display = "flex";
  }

  function closeCatOverlay() { document.getElementById("cat-overlay").style.display = "none"; catEditId = null; }

  function saveCatalogoProdotto() {
    var codice = document.getElementById("cat-codice").value.trim();
    if (!codice) { showToast("Inserisci il codice/nome prodotto"); return; }
    var editorEl = document.getElementById("cat-desc-editor");
    var descrizione = editorEl ? editorEl.innerHTML.trim() : null;
    if (descrizione === "") descrizione = null;
    var payload = {
      codice: codice,
      descrizione: descrizione,
      prezzo_default: document.getElementById("cat-prezzo").value !== "" ? parseFloat(document.getElementById("cat-prezzo").value) : null
    };
    var method = catEditId ? "PATCH" : "POST";
    var path = catEditId ? ("catalogo?id=eq." + catEditId) : "catalogo";
    apiFetch(path, method, payload).then(function() {
      closeCatOverlay(); showToast("Prodotto salvato");
      apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; renderCatalogo(); });
    }).catch(function() { showToast("Errore nel salvataggio"); });
  }

  function deleteCatalogoProdotto() {
    if (!catEditId) return;
    if (!confirm("Eliminare questo prodotto dal catalogo?")) return;
    apiFetch("catalogo?id=eq." + catEditId, "DELETE").then(function() {
      closeCatOverlay(); showToast("Prodotto eliminato");
      apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; renderCatalogo(); });
    }).catch(function() { showToast("Errore"); });
  }

  // ---- PICK DAL CATALOGO ----
  function openPick(si, vi) {
    pickSi = si; pickVi = vi;
    document.getElementById("pick-search").value = "";
    renderPickList("");
    document.getElementById("pick-overlay").style.display = "flex";
    setTimeout(function() { document.getElementById("pick-search").focus(); }, 50);
  }

  function renderPickList(q) {
    var list = catalogo.filter(function(c) {
      if (!q) return true;
      return (c.codice||"").toLowerCase().includes(q.toLowerCase()) || (c.descrizione||"").toLowerCase().includes(q.toLowerCase());
    });
    var wrap = document.getElementById("pick-list");
    if (!list.length) { wrap.innerHTML = '<div style="text-align:center;color:var(--text3);padding:1.5rem;">Nessun prodotto trovato nel catalogo</div>'; return; }
    wrap.innerHTML = "";
    list.forEach(function(c) {
      var item = document.createElement("div"); item.className = "pick-item";
      item.innerHTML = '<div class="pick-code">' + esc(c.codice) + (c.prezzo_default!=null?' <span style="font-weight:400;color:var(--text3);font-size:12px;">— ' + fmtEur(c.prezzo_default) + '</span>':'') + '</div><div class="pick-desc">' + esc(c.descrizione||"") + '</div>';
      item.addEventListener("click", function() {
        if (pickSi < 0 || pickVi < 0) return;
        sezioni[pickSi].voci[pickVi].codice = c.codice;
        sezioni[pickSi].voci[pickVi].descrizione = c.descrizione || "";
        if (c.prezzo_default != null) {
          if (!sezioni[pickSi].voci[pickVi].sub.length) sezioni[pickSi].voci[pickVi].sub.push({ desc: "", qta: 1, prezzo: 0 });
          sezioni[pickSi].voci[pickVi].sub[0].prezzo = c.prezzo_default;
        }
        renderVoci(pickSi);
        updatePreview();
        document.getElementById("pick-overlay").style.display = "none";
        pickSi = -1; pickVi = -1;
      });
      wrap.appendChild(item);
    });
  }

  // ---- PDF ----
  function buildPDF() {
    var numero = document.getElementById("e-numero").value;
    var data = document.getElementById("e-data").value;
    var oggetto = document.getElementById("e-oggetto").value;
    var cnome = document.getElementById("e-cnome").value;
    var cref = document.getElementById("e-cref").value;
    var cind = document.getElementById("e-cind").value;
    var ccitta = document.getElementById("e-ccitta").value;
    var ctel = document.getElementById("e-ctel").value;
    var cemail = document.getElementById("e-cemail").value;
    var tfine = document.getElementById("e-tfine").value;
    var fnome = document.getElementById("e-fnome").value;
    var fruolo = document.getElementById("e-fruolo").value;
    var dataFmt = data ? (dayIta(data) + " " + fmtDate(data)) : "";
    var totGlobale = 0;
    var sezioniHtml = "";
    var logoSrc = document.querySelector(".topbar img").src;
    sezioni.forEach(function(s) {
      if (s.titolo) sezioniHtml += "<tr><td colspan='6' style='padding:0'><div class='psec'>" + esc(s.titolo) + "</div></td></tr>";
      (s.voci||[]).forEach(function(v, vi) {
        var imgH = v.img ? "<img src='" + v.img + "' class='pimg'>" : "";
        var descHtml = (v.descrizione || "").replace(/\n/g,"<br>");
        sezioniHtml += "<tr><td style='width:28px;vertical-align:top;padding-top:8px;'>" + (vi+1) + "</td><td style='width:105px;vertical-align:top;'><div class='cod'>" + esc(v.codice) + "</div>" + imgH + "</td><td style='vertical-align:top;'>" + descHtml + "</td><td></td><td></td><td></td></tr>";
        (v.sub||[]).forEach(function(sb) {
          var imp = (sb.qta||0)*(sb.prezzo||0); totGlobale += imp;
          sezioniHtml += "<tr><td></td><td></td><td>" + esc(sb.desc) + "</td><td class='r'>" + (sb.qta||0) + "</td><td class='r'>" + (sb.prezzo?fmtEur(sb.prezzo):"") + "</td><td class='r'>" + (imp?fmtEur(imp):"") + "</td></tr>";
        });
        if ((v.acc||[]).length) {
          sezioniHtml += "<tr><td colspan='6' style='padding:3px 7px;background:#f8f8f8;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999;border-bottom:none;'>Accessori</td></tr>";
          (v.acc||[]).forEach(function(ac) {
            var imp2 = (ac.qta||0)*(ac.prezzo||0); totGlobale += imp2;
            sezioniHtml += "<tr style='background:#fafafa;'><td></td><td></td><td style='font-style:italic;'>" + esc(ac.desc) + "</td><td class='r'>" + (ac.qta||0) + "</td><td class='r'>" + (ac.prezzo?fmtEur(ac.prezzo):"") + "</td><td class='r'>" + (imp2?fmtEur(imp2):"") + "</td></tr>";
          });
        }
      });
    });
    var condHtml = condizioni.map(function(c) {
      return "<div class='pcond-row'><span class='pcond-lbl'>" + esc(c.label) + ":</span><span>" + esc(c.valore) + "</span></div>";
    }).join("");
    return '<div class="ph"><img src="' + logoSrc + '" class="ph-logo" alt="Tuega"><div class="ph-az">Sede Operativa e Amministrativa:<br>Via Alessandro Antonelli 4/a - 10093 Collegno TO Italy<br>Tel. 011202678<br>Sede legale:<br>Via Fratel Prospero 14 - 10095 Grugliasco TO<br>Partita IVA 12395420016 - R.E.A.: TO 1286895<br>www.tuega.com &nbsp; www.tuega.it &nbsp; info@tuega.com</div></div>' +
      '<div class="pm"><div class="pm-l">Collegno, ' + esc(dataFmt) + '</div><div class="pm-r">Spett.le<br><span class="pm-cn">' + esc(cnome) + '</span><br>' + (cind?esc(cind)+'<br>':'') + (ccitta?esc(ccitta)+'<br>':'') + (cref?'C.A. <strong>'+esc(cref)+'</strong><br>':'') + (ctel?'Tel. '+esc(ctel)+'<br>':'') + (cemail?esc(cemail):'') + '</div></div>' +
      (numero?'<div class="pnum">'+esc(numero)+'</div>':'') +
      '<div class="pogg"><strong>Ogg.: ' + esc(oggetto) + '</strong></div>' +
      '<p style="margin-bottom:8px;font-size:10px;">Di seguito, le quotazioni economiche come richiesto:</p>' +
      '<p class="piva">Tutti i prezzi, anche se non espressamente indicato sono I.V.A. esclusa.</p>' +
      '<table class="ptab"><colgroup><col style="width:4%"><col style="width:15%"><col style="width:45%"><col style="width:6%"><col style="width:15%"><col style="width:15%"></colgroup><thead><tr><th>Pos.</th><th>CODICE</th><th>DESCRIZIONE</th><th class="r">QTA</th><th class="r">PREZZO UNITARIO</th><th class="r">IMPORTO</th></tr></thead><tbody>' + sezioniHtml +
      '<tr class="ptot"><td colspan="5" style="text-align:right;">TOTALE OFFERTA (IVA ESCLUSA)</td><td class="r">' + fmtEur(totGlobale) + '</td></tr></tbody></table>' +
      (condizioni.length?'<div class="pcond"><div class="psec">CONDIZIONI DI FORNITURA</div><div class="pcond-grid">' + condHtml + '</div></div>':'') +
      '<p style="font-size:10px;margin-bottom:12px;">' + esc(tfine) + '</p>' +
      '<div class="pfirma"><div class="pfirma-nome">' + esc(fnome) + '</div><strong>TUEGA SRL</strong><br><div class="pfirma-ruolo">' + esc(fruolo) + '</div></div>' +
      '<div class="pfoot">Sede Operativa e Amministrativa: Via Alessandro Antonelli 4/a - 10093 Collegno TO Italy - Tel. 011202678<br>Sede legale: Via Fratel Prospero 14 - 10095 Grugliasco TO - Partita IVA 12395420016 - R.E.A.: TO 1286895</div>';
  }

  function updatePreview() {
    var doc = document.getElementById("pdf-doc"); if (doc) doc.innerHTML = buildPDF();
  }

  // ---- SAVE ----
  function savePreventivo() {
    var numero = document.getElementById("e-numero").value.trim();
    var cnome = document.getElementById("e-cnome").value.trim();
    if (!numero) { showToast("Inserisci il numero offerta"); return; }
    if (!cnome) { showToast("Inserisci il nome cliente"); return; }
    var totale = 0;
    sezioni.forEach(function(s) {
      (s.voci||[]).forEach(function(v) {
        (v.sub||[]).forEach(function(sb) { totale += (sb.qta||0)*(sb.prezzo||0); });
        (v.acc||[]).forEach(function(ac) { totale += (ac.qta||0)*(ac.prezzo||0); });
      });
    });
    var statoAttuale = "bozza";
    if (editId) { var ep = preventivi.find(function(p) { return p.id===editId; }); if (ep) statoAttuale = ep.stato||"bozza"; }
    var payload = {
      numero: numero, data_offerta: document.getElementById("e-data").value||null,
      oggetto: document.getElementById("e-oggetto").value||null, cliente_nome: cnome,
      cliente_ref: document.getElementById("e-cref").value||null, cliente_ind: document.getElementById("e-cind").value||null,
      cliente_citta: document.getElementById("e-ccitta").value||null, cliente_tel: document.getElementById("e-ctel").value||null,
      cliente_email: document.getElementById("e-cemail").value||null, testo_fine: document.getElementById("e-tfine").value||null,
      firma_nome: document.getElementById("e-fnome").value||null, firma_ruolo: document.getElementById("e-fruolo").value||null,
      sezioni_json: JSON.stringify(sezioni), condizioni_json: JSON.stringify(condizioni),
      totale: totale||null, stato: statoAttuale
    };
    var method = editId ? "PATCH" : "POST";
    var path = editId ? ("preventivi?id=eq." + editId) : "preventivi";
    apiFetch(path, method, payload).then(function(res) {
      if (!editId && res && res[0]) editId = res[0].id;
      showToast("Preventivo salvato");
      apiFetch("preventivi?order=created_at.desc").then(function(d) { preventivi = d||[]; });
    }).catch(function() { showToast("Errore nel salvataggio"); });
  }

  // ---- STATO ----
  function openStatoModal() { document.getElementById("stato-overlay").style.display = "flex"; }
  function closeStatoModal() { document.getElementById("stato-overlay").style.display = "none"; }
  function setStato(s) {
    if (!editId) { showToast("Salva prima il preventivo"); closeStatoModal(); return; }
    apiFetch("preventivi?id=eq." + editId, "PATCH", { stato: s }).then(function() {
      var p = preventivi.find(function(x) { return x.id===editId; }); if (p) p.stato = s;
      closeStatoModal(); showToast("Stato: " + s);
    }).catch(function() { showToast("Errore"); });
  }
  function deletePreventivo() {
    if (!editId) return;
    if (!confirm("Eliminare questo preventivo?")) return;
    apiFetch("preventivi?id=eq." + editId, "DELETE").then(function() {
      closeStatoModal(); editId = null;
      apiFetch("preventivi?order=created_at.desc").then(function(d) { preventivi=d||[]; renderList(); });
      showToast("Eliminato");
    }).catch(function() { showToast("Errore"); });
  }

  // ---- PDF DOWNLOAD ----
  function downloadPDF() {
    var numero = document.getElementById("e-numero").value||"preventivo";
    var cnome = (document.getElementById("e-cnome").value||"cliente").split(" ").join("_");
    var wrapper = document.createElement("div");
    var style = document.createElement("style");
    var css = ""; document.querySelectorAll("style").forEach(function(s) { css += s.textContent; });
    style.textContent = css; wrapper.appendChild(style);
    var content = document.createElement("div"); content.id = "pdf-doc";
    content.innerHTML = buildPDF();
    wrapper.appendChild(content);
    html2pdf().set({
      margin: [12, 12, 12, 12],
      filename: numero + "_" + cnome + ".pdf",
      image: { type: "jpeg", quality: 1.0 },
      html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowWidth: 900 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: "css", avoid: ".ptab, .ptab tr" }
    }).from(wrapper).save();
  }

  // ---- BIND EVENTS ----
  document.getElementById("btn-nuovo").addEventListener("click", newPreventivo);
  document.getElementById("btn-back").addEventListener("click", function() { renderList(); });
  document.getElementById("btn-stato").addEventListener("click", openStatoModal);
  document.getElementById("btn-salva").addEventListener("click", savePreventivo);
  document.getElementById("btn-pdf").addEventListener("click", downloadPDF);
  document.getElementById("btn-pdf2").addEventListener("click", downloadPDF);
  document.getElementById("btn-add-sezione").addEventListener("click", function() {
    sezioni.push({ titolo: "", voci: [{ codice:"", descrizione:"", img:null, sub:[{desc:"",qta:1,prezzo:0}], acc:[] }] });
    renderSezioni(); updatePreview();
  });
  document.getElementById("btn-add-cond").addEventListener("click", function() { condizioni.push({label:"",valore:""}); renderCondizioni(); updatePreview(); });
  document.getElementById("btn-catalogo").addEventListener("click", showCatalogo);
  document.getElementById("btn-cat-back").addEventListener("click", function() { renderList(); });
  document.getElementById("btn-cat-nuovo").addEventListener("click", openCatNew);
  document.getElementById("cat-btn-salva").addEventListener("click", saveCatalogoProdotto);
  document.querySelectorAll("#cat-rte-toolbar .rte-btn[data-cmd]").forEach(function(btn) {
    btn.addEventListener("mousedown", function(e) {
      e.preventDefault();
      document.execCommand(this.dataset.cmd, false, null);
    });
  });
  document.querySelectorAll("#cat-rte-toolbar .rte-color[data-color]").forEach(function(btn) {
    btn.addEventListener("mousedown", function(e) {
      e.preventDefault();
      document.execCommand("foreColor", false, this.dataset.color);
    });
  });
  document.getElementById("cat-btn-annulla").addEventListener("click", closeCatOverlay);
  document.getElementById("cat-btn-del").addEventListener("click", deleteCatalogoProdotto);
  document.getElementById("cat-overlay").addEventListener("click", function(e) { if(e.target===this) closeCatOverlay(); });
  document.getElementById("pick-annulla").addEventListener("click", function() { document.getElementById("pick-overlay").style.display="none"; pickSi=-1; pickVi=-1; });
  document.getElementById("pick-overlay").addEventListener("click", function(e) { if(e.target===this){ this.style.display="none"; pickSi=-1; pickVi=-1; } });
  document.getElementById("pick-search").addEventListener("input", function() { renderPickList(this.value); });
  document.getElementById("btn-s-bozza").addEventListener("click", function() { setStato("bozza"); });
  document.getElementById("btn-s-inviata").addEventListener("click", function() { setStato("inviata"); });
  document.getElementById("btn-s-accettata").addEventListener("click", function() { setStato("accettata"); });
  document.getElementById("btn-s-rifiutata").addEventListener("click", function() { setStato("rifiutata"); });
  document.getElementById("btn-s-annulla").addEventListener("click", closeStatoModal);
  document.getElementById("btn-s-elimina").addEventListener("click", deletePreventivo);
  document.getElementById("stato-overlay").addEventListener("click", function(e) { if(e.target===this) closeStatoModal(); });
  document.getElementById("search").addEventListener("input", renderList);
  document.getElementById("filter-stato").addEventListener("change", renderList);
  document.addEventListener("keydown", function(e) {
    if(e.key==="Escape"){
      closeStatoModal();
      document.getElementById("cat-overlay").style.display="none";
      document.getElementById("pick-overlay").style.display="none";
    }
  });

  loadAll();
})();
</script>
</body>
</html>
