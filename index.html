<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuega - Preventivi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd8;--border2:#ccc8c2;
  --text:#1a1916;--text2:#6b6760;--text3:#9e9b96;
  --green-bg:#e8f5ee;--green-text:#1a6640;--green-border:#a8d9bc;
  --red-bg:#fcecea;--red-text:#8b2a20;--red-border:#f0b8b2;
  --blue-bg:#e8f0fc;--blue-text:#1a3a8f;--blue-border:#a8bcf0;
  --radius:10px;--radius-sm:6px;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;gap:12px;}
.topbar img{height:28px;opacity:.85;}
.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
.btn{font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);border-color:var(--border2);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{background:#333;}
.btn-danger{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border);}
.btn-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.btn-sm{font-size:13px;padding:5px 10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover td{background:#faf9f7;cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid transparent;}
.badge.bozza{background:var(--surface2);color:var(--text2);border-color:var(--border);}
.badge.inviata{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);}
.badge.accettata{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.badge.rifiutata{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border);}
.mono{font-family:"DM Mono",monospace;font-size:13px;}
.muted{color:var(--text3);}
.empty{text-align:center;padding:4rem 2rem;color:var(--text3);}
.toolbar{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.inp{font-family:"DM Sans",sans-serif;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);outline:none;width:100%;}
.inp:focus{border-color:var(--border2);}
textarea.inp{resize:vertical;min-height:60px;}
.lbl{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.frow{margin-bottom:.9rem;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.overlay{position:fixed;inset:0;background:rgba(20,18,14,.5);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:1.5rem;overflow-y:auto;}
.modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.75rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);margin:auto;}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
.editor-wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
.editor-top{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.editor-top h1{font-size:18px;font-weight:600;flex:1;}
.editor-grid{display:grid;grid-template-columns:1fr 440px;gap:1.5rem;align-items:start;}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:1rem;}
.voce-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9rem;margin-bottom:.75rem;background:var(--surface);}
.voce-hd{display:flex;align-items:center;gap:6px;margin-bottom:.6rem;flex-wrap:wrap;}
.voce-num{font-family:"DM Mono",monospace;font-size:12px;color:var(--text3);min-width:32px;}
.voce-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 6px;border-radius:4px;}
.voce-del:hover{background:var(--red-bg);color:var(--red-text);}
.img-ph{width:72px;height:64px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;cursor:pointer;text-align:center;line-height:1.4;flex-shrink:0;}
.img-ph:hover{border-color:var(--text3);}
.img-prev{width:72px;height:64px;object-fit:contain;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;flex-shrink:0;}
.grid-sub{display:grid;grid-template-columns:1fr 56px 90px 24px;gap:6px;}
.sub-hd{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:6px 0 4px;border-top:1px solid var(--border);margin-top:.6rem;}
.sub-row{margin-bottom:5px;align-items:center;}
.sub-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px;}
.sub-del:hover{color:var(--red-text);}
.add-btn{font-size:12px;color:var(--text2);background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;margin-top:6px;display:inline-block;}
.add-btn:hover{border-color:var(--text);color:var(--text);}
.acc-section{border:1px dashed var(--green-border);border-radius:var(--radius-sm);padding:.75rem;margin-top:.75rem;background:#fafff8;}
.acc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--green-text);margin-bottom:.5rem;}
.cond-row{display:grid;grid-template-columns:120px 1fr 24px;gap:8px;margin-bottom:7px;align-items:center;}
.preview-sticky{position:sticky;top:70px;}
.prev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.prev-hd{padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.prev-hd span{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);}
.prev-body{overflow:auto;max-height:calc(100vh - 180px);}
/* catalogo */
.cat-item{display:grid;grid-template-columns:160px 1fr 100px 80px;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:14px;}
.cat-item:last-child{border-bottom:none;}
.cat-item:hover{background:#faf9f7;}
/* pick modal */
.pick-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;cursor:pointer;transition:border-color .1s;}
.pick-item:hover{background:var(--green-bg);border-color:var(--green-border);}
.pick-code{font-weight:600;font-size:13px;margin-bottom:2px;}
.pick-desc{font-size:12px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* PDF */
#pdf-doc{font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#222;background:#fff;padding:18px 22px;width:100%;max-width:780px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #ddd;}
.ph-logo{height:38px;}
.ph-az{font-size:9.5px;color:#555;line-height:1.65;text-align:right;}
.pm{display:flex;justify-content:space-between;margin-bottom:14px;}
.pm-l{font-size:9.5px;color:#444;line-height:1.8;}
.pm-r{font-size:10.5px;line-height:1.8;}
.pm-cn{font-weight:700;font-size:11.5px;}
.pnum{font-size:10.5px;color:#444;margin-bottom:10px;}
.pogg{background:#f0f0f0;border-left:3px solid #888;padding:7px 11px;margin-bottom:12px;}
.pogg strong{font-size:11.5px;}
.piva{font-style:italic;font-weight:600;font-size:10px;margin-bottom:12px;}
.psec{background:#e8e8e8;padding:5px 9px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:1px solid #ccc;}
.ptab{width:100%;border-collapse:collapse;margin-bottom:12px;}
.ptab th{background:#f5f5f5;border:1px solid #ccc;padding:5px 7px;font-size:9.5px;font-weight:700;text-align:left;}
.ptab th.r,.ptab td.r{text-align:right;}
.ptab td{border:1px solid #ddd;padding:5px 7px;vertical-align:top;font-size:9.5px;}
.ptab td.cod{font-weight:700;}
.pimg{max-width:85px;max-height:75px;object-fit:contain;display:block;margin:3px 0;}
.ptot td{font-weight:700;background:#f5f5f5;}
.pcond{margin-top:12px;}
.pcond-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 20px;margin:7px 0 12px 3px;}
.pcond-row{display:flex;gap:7px;font-size:9.5px;}
.pcond-lbl{font-weight:600;min-width:85px;}
.pfirma{margin-top:14px;font-size:10.5px;line-height:1.8;}
.pfirma-nome{font-weight:700;}
.pfirma-ruolo{color:#888;font-size:9.5px;}
.pfoot{margin-top:18px;padding-top:8px;border-top:1px solid #ddd;font-size:8.5px;color:#888;text-align:center;line-height:1.6;}
.ptab td{word-wrap:break-word;word-break:break-word;white-space:normal;max-width:0;}
.ptab{table-layout:fixed;word-wrap:break-word;}
.ptab tr{page-break-inside:avoid;}
.voce-box{page-break-inside:avoid;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:999;}
.rte-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface);}
.rte-wrap:focus-within{border-color:var(--border2);box-shadow:0 0 0 3px rgba(26,25,22,.06);}
.rte-toolbar{display:flex;align-items:center;gap:2px;padding:5px 8px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.rte-btn{background:none;border:1px solid transparent;border-radius:4px;cursor:pointer;padding:3px 7px;font-size:13px;color:var(--text2);font-family:"DM Sans",sans-serif;line-height:1.4;}
.rte-btn:hover{background:var(--surface);border-color:var(--border);}
.rte-btn.active{background:var(--surface);border-color:var(--border2);color:var(--text);}
.rte-sep{width:1px;height:18px;background:var(--border);margin:0 3px;}
.rte-color{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;flex-shrink:0;}
.rte-color:hover{border-color:var(--border2);}
.rte-editor{min-height:80px;padding:8px 10px;font-size:13px;font-family:"DM Sans",sans-serif;outline:none;line-height:1.6;color:var(--text);}
.rte-editor:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;}
@media(max-width:900px){.editor-grid{grid-template-columns:1fr;}.preview-sticky{position:static;}}
@media(max-width:600px){.container,.editor-wrap{padding:1rem;}.topbar{padding:0 1rem;}}
@media print {
  #pdf-doc {
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .ptab {
    width: 100% !important;
    table-layout: fixed !important; /* Forza il rispetto delle larghezze delle colonne */
    border-collapse: collapse !important;
  }
  .ptab th, .ptab td {
    word-wrap: break-word !important; /* Spezza le parole lunghe (es. codici o email) */
    overflow: hidden !important;
    padding: 5px !important;
    font-size: 8.5px !important; /* Font leggermente più piccolo per sicurezza */
  }
}
</style>
</head>

        "Authorization": "Bearer " + SKEY,
        "Prefer": "return=representation"
      }
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    return fetch(SURL + "/rest/v1/" + path, opts).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.text().then(function(t) { return t ? JSON.parse(t) : null; });
    });
  }

  // ---- UTILS ----

  function escA(s) { return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function showToast(msg) {
    var e = document.querySelector(".toast"); if (e) e.remove();

    setTimeout(function() { if (t.parentNode) t.remove(); }, 3000);
  }
  function showView(name) {

      document.getElementById(id).style.display = id === name ? "" : "none";

  // ---- LOAD ----

      showView("view-list");
    });
    apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; }).catch(function() {});
  }

  // ---- LIST ----
  function renderList() {
    showView("view-list");
    var q = document.getElementById("search").value.toLowerCase();
    var f = document.getElementById("filter-stato").value;
    var list = preventivi.filter(function(p) {
      if (f && p.stato !== f) return false;
      if (q && !((p.numero||"").toLowerCase().includes(q)||(p.cliente_nome||"").toLowerCase().includes(q)||(p.oggetto||"").toLowerCase().includes(q))) return false;
      return true;
    });
    var wrap = document.getElementById("list-wrap");
    if (!list.length) { wrap.innerHTML = '<div class="empty">Nessun preventivo trovato</div>'; return; }
    var html = '<table><thead><tr><th>Numero</th><th>Data</th><th>Cliente</th><th>Oggetto</th><th style="text-align:right">Totale</th><th>Stato</th><th></th></tr></thead><tbody>';

      var stato = p.stato || "bozza";
      html += '<tr class="clickable" data-id="' + p.id + '"><td class="mono">' + esc(p.numero||"-") + '</td><td class="mono">' + fmtDate(p.data_offerta) + '</td><td style="font-weight:500">' + esc(p.cliente_nome||"-") + '</td><td class="muted">' + esc(p.oggetto||"-") + '</td><td class="mono" style="text-align:right">' + (p.totale!=null?fmtEur(p.totale):"-") + '</td><td><span class="badge ' + stato + '">' + stato + '</span></td><td><button class="btn btn-sm" data-open="' + p.id + '">Apri</button></td></tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    wrap.querySelectorAll("tr.clickable").forEach(function(r) { r.addEventListener("click", function() { openEditor(this.dataset.id); }); });
    wrap.querySelectorAll("button[data-open]").forEach(function(b) { b.addEventListener("click", function(e) { e.stopPropagation(); openEditor(this.dataset.open); }); });
  }

  // ---- EDITOR ----
  function resetForm() {

  function openEditorView(title) {

    showView("view-editor");

    renderCondizioni();

    condizioni = [
      { label: "Consegna", valore: "" }, { label: "Pagamento", valore: "" },
      { label: "Garanzia", valore: "" }, { label: "Resa", valore: "" },
      { label: "Spedizione", valore: "" }, { label: "Imballi", valore: "" },

    ];

    var p = preventivi.find(function(x) { return x.id === id; });

    editId = id;
    resetForm();
    document.getElementById("e-numero").value = p.numero || "";
    document.getElementById("e-data").value = p.data_offerta || "";
    document.getElementById("e-oggetto").value = p.oggetto || "";
    document.getElementById("e-cnome").value = p.cliente_nome || "";
    document.getElementById("e-cref").value = p.cliente_ref || "";
    document.getElementById("e-cind").value = p.cliente_ind || "";
    document.getElementById("e-ccitta").value = p.cliente_citta || "";

    document.getElementById("e-cemail").value = p.cliente_email || "";

    try { sezioni = JSON.parse(p.sezioni_json) || []; } catch(e2) { sezioni = []; }
    // ensure acc array exists on all voci
    sezioni.forEach(function(s) { (s.voci||[]).forEach(function(v) { if (!v.acc) v.acc = []; }); });
    try { condizioni = JSON.parse(p.condizioni_json) || []; } catch(e2) { condizioni = []; }

  // ---- SEZIONI ----
  function renderSezioni() {
    var wrap = document.getElementById("sezioni-wrap");
    wrap.innerHTML = "";
    sezioni.forEach(function(s, si) { wrap.appendChild(buildSezioneEl(si)); });
  }

  function buildSezioneEl(si) {
    var s = sezioni[si];
    var div = document.createElement("div");
    div.style.marginBottom = "1rem";
    var topDiv = document.createElement("div");
    topDiv.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:.5rem;";
    var inp = document.createElement("input");
    inp.type = "text"; inp.className = "inp";
    inp.style.cssText = "flex:1;font-weight:600;text-transform:uppercase;font-size:13px;";
    inp.placeholder = "Titolo sezione (es. CONTROLLO REMOTO)";
    inp.value = s.titolo || "";
    inp.addEventListener("input", function() { sezioni[si].titolo = this.value; updatePreview(); });
    var delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger btn-sm"; delBtn.textContent = "X Sezione";
    delBtn.addEventListener("click", function() {
      if (sezioni.length <= 1) { showToast("Almeno una sezione richiesta"); return; }
      sezioni.splice(si, 1); renderSezioni(); updatePreview();
    });
    topDiv.appendChild(inp); topDiv.appendChild(delBtn);
    var vociDiv = document.createElement("div"); vociDiv.id = "voci-" + si;
    var addVoceBtn = document.createElement("button");
    addVoceBtn.className = "add-btn"; addVoceBtn.textContent = "+ Aggiungi voce prodotto";
    addVoceBtn.addEventListener("click", function() {
      sezioni[si].voci.push({ codice: "", descrizione: "", img: null, sub: [{ desc: "", qta: 1, prezzo: 0 }], acc: [] });
      renderVoci(si); updatePreview();
    });
    div.appendChild(topDiv); div.appendChild(vociDiv); div.appendChild(addVoceBtn);
    renderVoci(si, vociDiv);
    return div;
  }

  function renderVoci(si, wrapEl) {
    var wrap = wrapEl || document.getElementById("voci-" + si);
    if (!wrap) return;
    wrap.innerHTML = "";
    (sezioni[si].voci || []).forEach(function(v, vi) { wrap.appendChild(buildVoceEl(si, vi)); });
  }

  function buildVoceEl(si, vi) {
    var v = sezioni[si].voci[vi];
    var box = document.createElement("div");
    box.className = "voce-box";

    // --- header row ---
    var hd = document.createElement("div"); hd.className = "voce-hd";
    var num = document.createElement("span"); num.className = "voce-num"; num.textContent = "Pos." + (vi + 1);
    var codInp = document.createElement("input");
    codInp.type = "text"; codInp.className = "inp";
    codInp.style.cssText = "flex:1;font-weight:700;font-size:13px;min-width:0;";
    codInp.placeholder = "CODICE / NOME PRODOTTO"; codInp.value = v.codice || "";
    codInp.addEventListener("input", function() { sezioni[si].voci[vi].codice = this.value; updatePreview(); });
    var pickBtn = document.createElement("button");
    pickBtn.className = "btn btn-green btn-sm"; pickBtn.textContent = "Dal catalogo";
    pickBtn.addEventListener("click", function() { openPick(si, vi); });
    var delBtn = document.createElement("button");
    delBtn.className = "voce-del"; delBtn.textContent = "X";
    delBtn.addEventListener("click", function() { sezioni[si].voci.splice(vi, 1); renderVoci(si); updatePreview(); });
    hd.appendChild(num); hd.appendChild(codInp); hd.appendChild(pickBtn); hd.appendChild(delBtn);
    box.appendChild(hd);

    // --- img + descrizione ---
    var imgRow = document.createElement("div"); imgRow.style.cssText = "display:flex;gap:10px;margin-bottom:.6rem;";
    var imgEl = v.img ? document.createElement("img") : document.createElement("div");
    if (v.img) { imgEl.src = v.img; imgEl.className = "img-prev"; }
    else { imgEl.className = "img-ph"; imgEl.innerHTML = "Foto<br>prodotto"; }
    imgEl.addEventListener("click", function() { fileInp.click(); });
    var fileInp = document.createElement("input");
    fileInp.type = "file"; fileInp.accept = "image/*"; fileInp.style.display = "none";
    fileInp.addEventListener("change", function() {
      var f = this.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function(ev) { sezioni[si].voci[vi].img = ev.target.result; renderVoci(si); updatePreview(); };
      r.readAsDataURL(f);

    var descDiv = document.createElement("div");
    descDiv.style.cssText = "flex:1;min-width:0;min-height:70px;font-size:12px;line-height:1.6;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);overflow:auto;max-height:160px;";
    descDiv.innerHTML = v.descrizione || '<span style="color:var(--text3);">Scegli dal catalogo o scrivi una descrizione</span>';
    imgRow.appendChild(imgEl); imgRow.appendChild(fileInp); imgRow.appendChild(descDiv);
    box.appendChild(imgRow);

    // --- righe prezzo ---
    var subHd = document.createElement("div"); subHd.className = "grid-sub sub-hd";
    subHd.innerHTML = "<span>Descrizione riga</span><span style='text-align:right'>Qta</span><span style='text-align:right'>Prezzo</span><span></span>";
    box.appendChild(subHd);
    var subWrap = document.createElement("div"); subWrap.id = "sub-" + si + "-" + vi;
    box.appendChild(subWrap);
    var addSubBtn = document.createElement("button");
    addSubBtn.className = "add-btn"; addSubBtn.textContent = "+ Aggiungi riga prezzo";
    addSubBtn.addEventListener("click", function() {
      sezioni[si].voci[vi].sub.push({ desc: "", qta: 1, prezzo: 0 }); renderSub(si, vi); updatePreview();

    renderSub(si, vi, subWrap);

    // --- accessori ---

    addAccBtn.addEventListener("click", function() {
      if (!sezioni[si].voci[vi].acc) sezioni[si].voci[vi].acc = [];
      sezioni[si].voci[vi].acc.push({ desc: "", qta: 1, prezzo: 0 }); renderAcc(si, vi); updatePreview();

    accSection.appendChild(accLabel); accSection.appendChild(accWrap); accSection.appendChild(addAccBtn);
    box.appendChild(accSection);
    renderAcc(si, vi, accWrap);

    return box;
  }

  function buildSubRow(si, vi, idx, isAcc) {
    var arr = isAcc ? sezioni[si].voci[vi].acc : sezioni[si].voci[vi].sub;

    var pInp = document.createElement("input"); pInp.type = "number"; pInp.className = "inp";
    pInp.style.cssText = "font-size:12px;text-align:right;"; pInp.min = "0"; pInp.step = "0.01"; pInp.value = item.prezzo || 0;

    delBtn.addEventListener("click", function() {
      arr.splice(idx, 1);
      if (isAcc) renderAcc(si, vi); else renderSub(si, vi);
      updatePreview();

    row.appendChild(dInp); row.appendChild(qInp); row.appendChild(pInp); row.appendChild(delBtn);
    return row;
  }

  function renderSub(si, vi, wrapEl) {
    var wrap = wrapEl || document.getElementById("sub-" + si + "-" + vi); if (!wrap) return;
    wrap.innerHTML = "";

  }

  function renderAcc(si, vi, wrapEl) {
    var wrap = wrapEl || document.getElementById("acc-" + si + "-" + vi); if (!wrap) return;
    wrap.innerHTML = "";
    var accs = sezioni[si].voci[vi].acc || [];
    if (!accs.length) { wrap.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 0;">Nessun accessorio. Clicca + per aggiungerne.</div>'; return; }
    accs.forEach(function(_, idx) { wrap.appendChild(buildSubRow(si, vi, idx, true)); });
  }

  // ---- CONDIZIONI ----
  function renderCondizioni() {
    var wrap = document.getElementById("cond-wrap"); wrap.innerHTML = "";
    condizioni.forEach(function(c, i) {
      var row = document.createElement("div"); row.className = "cond-row";
      var lInp = document.createElement("input"); lInp.type = "text"; lInp.className = "inp"; lInp.style.fontSize = "13px"; lInp.style.fontWeight = "500"; lInp.value = c.label || "";
      lInp.addEventListener("input", function() { condizioni[i].label = this.value; updatePreview(); });
      var vInp = document.createElement("input"); vInp.type = "text"; vInp.className = "inp"; vInp.style.fontSize = "13px"; vInp.value = c.valore || "";
      vInp.addEventListener("input", function() { condizioni[i].valore = this.value; updatePreview(); });
      var delBtn = document.createElement("button"); delBtn.style.cssText = "background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;"; delBtn.textContent = "X";
      delBtn.addEventListener("click", function() { condizioni.splice(i, 1); renderCondizioni(); updatePreview(); });
      row.appendChild(lInp); row.appendChild(vInp); row.appendChild(delBtn);
      wrap.appendChild(row);
    });
  }

  // ---- CATALOGO ----
  function showCatalogo() {
    showView("view-catalogo");
    apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; renderCatalogo(); }).catch(function() { showToast("Errore caricamento catalogo"); });
  }

  function renderCatalogo() {
    var wrap = document.getElementById("cat-wrap");
    if (!catalogo.length) { wrap.innerHTML = '<div class="empty">Nessun prodotto nel catalogo. Clicca + per aggiungerne uno!</div>'; return; }
    var html = "";
    catalogo.forEach(function(c) {
      html += '<div class="cat-item"><span style="font-weight:600;">' + esc(c.codice) + '</span><span style="color:var(--text2);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(c.descrizione||"") + '</span><span class="mono">' + (c.prezzo_default!=null?fmtEur(c.prezzo_default):"-") + '</span><button class="btn btn-sm" data-cat-edit="' + c.id + '">Modifica</button></div>';
    });
    wrap.innerHTML = html;
    wrap.querySelectorAll("[data-cat-edit]").forEach(function(b) { b.addEventListener("click", function() { openCatEdit(this.dataset.catEdit); }); });
  }

  function openCatNew() {
    catEditId = null;
    document.getElementById("cat-modal-title").textContent = "Nuovo prodotto";
    document.getElementById("cat-codice").value = "";
    var edNew = document.getElementById("cat-desc-editor"); if(edNew) edNew.innerHTML = "";
    document.getElementById("cat-prezzo").value = "";
    document.getElementById("cat-btn-del").style.display = "none";
    document.getElementById("cat-overlay").style.display = "flex";
    setTimeout(function() { document.getElementById("cat-codice").focus(); }, 50);
  }

  function openCatEdit(id) {
    var c = catalogo.find(function(x) { return x.id === id; }); if (!c) return;
    catEditId = id;
    document.getElementById("cat-modal-title").textContent = "Modifica prodotto";
    document.getElementById("cat-codice").value = c.codice || "";
    var edEdit = document.getElementById("cat-desc-editor"); if(edEdit) edEdit.innerHTML = c.descrizione || "";
    document.getElementById("cat-prezzo").value = c.prezzo_default != null ? c.prezzo_default : "";
    document.getElementById("cat-btn-del").style.display = "";
    document.getElementById("cat-overlay").style.display = "flex";
  }

  function closeCatOverlay() { document.getElementById("cat-overlay").style.display = "none"; catEditId = null; }

  function saveCatalogoProdotto() {
    var codice = document.getElementById("cat-codice").value.trim();
    if (!codice) { showToast("Inserisci il codice/nome prodotto"); return; }
    var editorEl = document.getElementById("cat-desc-editor");
    var descrizione = editorEl ? editorEl.innerHTML.trim() : null;
    if (descrizione === "") descrizione = null;
    var payload = {
      codice: codice,
      descrizione: descrizione,
      prezzo_default: document.getElementById("cat-prezzo").value !== "" ? parseFloat(document.getElementById("cat-prezzo").value) : null
    };
    var method = catEditId ? "PATCH" : "POST";
    var path = catEditId ? ("catalogo?id=eq." + catEditId) : "catalogo";
    apiFetch(path, method, payload).then(function() {
      closeCatOverlay(); showToast("Prodotto salvato");
      apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; renderCatalogo(); });
    }).catch(function() { showToast("Errore nel salvataggio"); });
  }

  function deleteCatalogoProdotto() {
    if (!catEditId) return;
    if (!confirm("Eliminare questo prodotto dal catalogo?")) return;
    apiFetch("catalogo?id=eq." + catEditId, "DELETE").then(function() {
      closeCatOverlay(); showToast("Prodotto eliminato");
      apiFetch("catalogo?order=codice.asc").then(function(d) { catalogo = d || []; renderCatalogo(); });
    }).catch(function() { showToast("Errore"); });
  }

  // ---- PICK DAL CATALOGO ----
  function openPick(si, vi) {
    pickSi = si; pickVi = vi;
    document.getElementById("pick-search").value = "";
    renderPickList("");
    document.getElementById("pick-overlay").style.display = "flex";
    setTimeout(function() { document.getElementById("pick-search").focus(); }, 50);
  }

  function renderPickList(q) {
    var list = catalogo.filter(function(c) {
      if (!q) return true;
      return (c.codice||"").toLowerCase().includes(q.toLowerCase()) || (c.descrizione||"").toLowerCase().includes(q.toLowerCase());
    });
    var wrap = document.getElementById("pick-list");
    if (!list.length) { wrap.innerHTML = '<div style="text-align:center;color:var(--text3);padding:1.5rem;">Nessun prodotto trovato nel catalogo</div>'; return; }
    wrap.innerHTML = "";
    list.forEach(function(c) {
      var item = document.createElement("div"); item.className = "pick-item";
      item.innerHTML = '<div class="pick-code">' + esc(c.codice) + (c.prezzo_default!=null?' <span style="font-weight:400;color:var(--text3);font-size:12px;">— ' + fmtEur(c.prezzo_default) + '</span>':'') + '</div><div class="pick-desc">' + esc(c.descrizione||"") + '</div>';
      item.addEventListener("click", function() {
        if (pickSi < 0 || pickVi < 0) return;
        sezioni[pickSi].voci[pickVi].codice = c.codice;
        sezioni[pickSi].voci[pickVi].descrizione = c.descrizione || "";
        if (c.prezzo_default != null) {
          if (!sezioni[pickSi].voci[pickVi].sub.length) sezioni[pickSi].voci[pickVi].sub.push({ desc: "", qta: 1, prezzo: 0 });
          sezioni[pickSi].voci[pickVi].sub[0].prezzo = c.prezzo_default;
        }
        renderVoci(pickSi);
        updatePreview();
        document.getElementById("pick-overlay").style.display = "none";
        pickSi = -1; pickVi = -1;
      });
      wrap.appendChild(item);
    });
  }

  // ---- PDF ----
function buildPDF() {
    var numero = document.getElementById("e-numero").value;
    var data = document.getElementById("e-data").value;
    var oggetto = document.getElementById("e-oggetto").value;
    var cnome = document.getElementById("e-cnome").value;
    var cref = document.getElementById("e-cref").value;
    var cind = document.getElementById("e-cind").value;
    var ccitta = document.getElementById("e-ccitta").value;
    var ctel = document.getElementById("e-ctel").value;
    var cemail = document.getElementById("e-cemail").value;
    var tfine = document.getElementById("e-tfine").value;
    var fnome = document.getElementById("e-fnome").value;
    var fruolo = document.getElementById("e-fruolo").value;
    var dataFmt = data ? (dayIta(data) + " " + fmtDate(data)) : "";
    var totGlobale = 0;
    var sezioniHtml = "";
    var logoSrc = document.querySelector(".topbar img").src;
    sezioni.forEach(function(s) {
      if (s.titolo) sezioniHtml += "<tr><td colspan='6' style='padding:0'><div class='psec'>" + esc(s.titolo) + "</div></td></tr>";
      (s.voci||[]).forEach(function(v, vi) {
        var imgH = v.img ? "<img src='" + v.img + "' class='pimg'>" : "";
        sezioniHtml += "<tr><td style='width:28px;vertical-align:top;padding-top:8px;'>" + (vi+1) + "</td><td style='width:105px;vertical-align:top;'><div class='cod'>" + esc(v.codice) + "</div>" + imgH + "</td><td style='vertical-align:top;'>" + esc(v.descrizione||"").replace(/\n/g,"<br>") + "</td><td></td><td></td><td></td></tr>";
        (v.sub||[]).forEach(function(sb) {
          var imp = (sb.qta||0)*(sb.prezzo||0); totGlobale += imp;
          sezioniHtml += "<tr><td></td><td></td><td>" + esc(sb.desc) + "</td><td class='r'>" + (sb.qta||0) + "</td><td class='r'>" + (sb.prezzo?fmtEur(sb.prezzo):"") + "</td><td class='r'>" + (imp?fmtEur(imp):"") + "</td></tr>";
        });
        if ((v.acc||[]).length) {
          sezioniHtml += "<tr><td colspan='6' style='padding:3px 7px;background:#f8f8f8;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999;border-bottom:none;'>Accessori</td></tr>";
          (v.acc||[]).forEach(function(ac) {
            var imp2 = (ac.qta||0)*(ac.prezzo||0); totGlobale += imp2;
            sezioniHtml += "<tr style='background:#fafafa;'><td></td><td></td><td style='font-style:italic;'>" + esc(ac.desc) + "</td><td class='r'>" + (ac.qta||0) + "</td><td class='r'>" + (ac.prezzo?fmtEur(ac.prezzo):"") + "</td><td class='r'>" + (imp2?fmtEur(imp2):"") + "</td></tr>";
          });
        }
      });
    });
    var condHtml = condizioni.map(function(c) {
      return "<div class='pcond-row'><span class='pcond-lbl'>" + esc(c.label) + ":</span><span>" + esc(c.valore) + "</span></div>";
    }).join("");
    return '<div class="ph"><img src="' + logoSrc + '" class="ph-logo" alt="Tuega"><div class="ph-az">Sede Operativa e Amministrativa:<br>Via Alessandro Antonelli 4/a - 10093 Collegno TO Italy<br>Tel. 011202678<br>Sede legale:<br>Via Fratel Prospero 14 - 10095 Grugliasco TO<br>Partita IVA 12395420016 - R.E.A.: TO 1286895<br>www.tuega.com &nbsp; www.tuega.it &nbsp; info@tuega.com</div></div>' +
      '<div class="pm"><div class="pm-l">Collegno, ' + esc(dataFmt) + '</div><div class="pm-r">Spett.le<br><span class="pm-cn">' + esc(cnome) + '</span><br>' + (cind?esc(cind)+'<br>':'') + (ccitta?esc(ccitta)+'<br>':'') + (cref?'C.A. <strong>'+esc(cref)+'</strong><br>':'') + (ctel?'Tel. '+esc(ctel)+'<br>':'') + (cemail?esc(cemail):'') + '</div></div>' +
      (numero?'<div class="pnum">'+esc(numero)+'</div>':'') +
      '<div class="pogg"><strong>Ogg.: ' + esc(oggetto) + '</strong></div>' +
      '<p style="margin-bottom:8px;font-size:10px;">Di seguito, le quotazioni economiche come richiesto:</p>' +
      '<p class="piva">Tutti i prezzi, anche se non espressamente indicato sono I.V.A. esclusa.</p>' +
      '<table class="ptab"><colgroup><col style="width:5%"><col style="width:15%"><col style="width:40%"><col style="width:8%"><col style="width:16%"><col style="width:16%"></colgroup><thead><tr><th>Pos.</th><th>CODICE</th><th>DESCRIZIONE</th><th class="r">QTA</th><th class="r">PREZZO UNITARIO</th><th class="r">IMPORTO</th></tr></thead><tbody>' + sezioniHtml +
      '<tr class="ptot"><td colspan="5" style="text-align:right;">TOTALE OFFERTA (IVA ESCLUSA)</td><td class="r">' + fmtEur(totGlobale) + '</td></tr></tbody></table>' +
      (condizioni.length?'<div class="pcond"><div class="psec">CONDIZIONI DI FORNITURA</div><div class="pcond-grid">' + condHtml + '</div></div>':'') +
      '<p style="font-size:10px;margin-bottom:12px;">' + esc(tfine) + '</p>' +
      '<div class="pfirma"><div class="pfirma-nome">' + esc(fnome) + '</div><strong>TUEGA SRL</strong><br><div class="pfirma-ruolo">' + esc(fruolo) + '</div></div>' +
      '<div class="pfoot">Sede Operativa e Amministrativa: Via Alessandro Antonelli 4/a - 10093 Collegno TO Italy - Tel. 011202678<br>Sede legale: Via Fratel Prospero 14 - 10095 Grugliasco TO - Partita IVA 12395420016 - R.E.A.: TO 1286895</div>';
  }

  // ---- SAVE ----
  function savePreventivo() {
    var numero = document.getElementById("e-numero").value.trim();
    var cnome = document.getElementById("e-cnome").value.trim();
    if (!numero) { showToast("Inserisci il numero offerta"); return; }
    if (!cnome) { showToast("Inserisci il nome cliente"); return; }
    var totale = 0;
    sezioni.forEach(function(s) {
      (s.voci||[]).forEach(function(v) {
        (v.sub||[]).forEach(function(sb) { totale += (sb.qta||0)*(sb.prezzo||0); });
        (v.acc||[]).forEach(function(ac) { totale += (ac.qta||0)*(ac.prezzo||0); });
      });
    });
    var statoAttuale = "bozza";
    if (editId) { var ep = preventivi.find(function(p) { return p.id===editId; }); if (ep) statoAttuale = ep.stato||"bozza"; }
    var payload = {
      numero: numero, data_offerta: document.getElementById("e-data").value||null,
      oggetto: document.getElementById("e-oggetto").value||null, cliente_nome: cnome,
      cliente_ref: document.getElementById("e-cref").value||null, cliente_ind: document.getElementById("e-cind").value||null,
      cliente_citta: document.getElementById("e-ccitta").value||null, cliente_tel: document.getElementById("e-ctel").value||null,
      cliente_email: document.getElementById("e-cemail").value||null, testo_fine: document.getElementById("e-tfine").value||null,
      firma_nome: document.getElementById("e-fnome").value||null, firma_ruolo: document.getElementById("e-fruolo").value||null,
      sezioni_json: JSON.stringify(sezioni), condizioni_json: JSON.stringify(condizioni),
      totale: totale||null, stato: statoAttuale
    };
    var method = editId ? "PATCH" : "POST";
    var path = editId ? ("preventivi?id=eq." + editId) : "preventivi";
    apiFetch(path, method, payload).then(function(res) {
      if (!editId && res && res[0]) editId = res[0].id;
      showToast("Preventivo salvato");
      apiFetch("preventivi?order=created_at.desc").then(function(d) { preventivi = d||[]; });
    }).catch(function() { showToast("Errore nel salvataggio"); });
  }

  // ---- STATO ----
  function openStatoModal() { document.getElementById("stato-overlay").style.display = "flex"; }
  function closeStatoModal() { document.getElementById("stato-overlay").style.display = "none"; }
  function setStato(s) {
    if (!editId) { showToast("Salva prima il preventivo"); closeStatoModal(); return; }
    apiFetch("preventivi?id=eq." + editId, "PATCH", { stato: s }).then(function() {
      var p = preventivi.find(function(x) { return x.id===editId; }); if (p) p.stato = s;
      closeStatoModal(); showToast("Stato: " + s);
    }).catch(function() { showToast("Errore"); });
  }
  function deletePreventivo() {
    if (!editId) return;
    if (!confirm("Eliminare questo preventivo?")) return;
    apiFetch("preventivi?id=eq." + editId, "DELETE").then(function() {
      closeStatoModal(); editId = null;
      apiFetch("preventivi?order=created_at.desc").then(function(d) { preventivi=d||[]; renderList(); });
      showToast("Eliminato");
    }).catch(function() { showToast("Errore"); });
  }

  // ---- PDF DOWNLOAD ----
  function downloadPDF() {
    var numero = document.getElementById("e-numero").value||"preventivo";
    var cnome = (document.getElementById("e-cnome").value||"cliente").split(" ").join("_");
    var wrapper = document.createElement("div");
    var style = document.createElement("style");
    var css = ""; document.querySelectorAll("style").forEach(function(s) { css += s.textContent; });
    style.textContent = css; wrapper.appendChild(style);
    var content = document.createElement("div"); content.id = "pdf-doc";
    content.innerHTML = buildPDF(); wrapper.appendChild(content);
    html2pdf().set({
      margin: [12, 12, 12, 12],
      filename: numero + "_" + cnome + ".pdf",
      image: { type: "jpeg", quality: 1.0 },
      html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowWidth: 900 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: "css", before: ".page-break", avoid: ".ptab tr" }
    }).from(wrapper).save();
  }

  // ---- BIND EVENTS ----
  document.getElementById("btn-nuovo").addEventListener("click", newPreventivo);
  document.getElementById("btn-back").addEventListener("click", function() { renderList(); });
  document.getElementById("btn-stato").addEventListener("click", openStatoModal);
  document.getElementById("btn-salva").addEventListener("click", savePreventivo);
  document.getElementById("btn-pdf").addEventListener("click", downloadPDF);
  document.getElementById("btn-pdf2").addEventListener("click", downloadPDF);
  document.getElementById("btn-add-sezione").addEventListener("click", function() {
    sezioni.push({ titolo: "", voci: [{ codice:"", descrizione:"", img:null, sub:[{desc:"",qta:1,prezzo:0}], acc:[] }] });
    renderSezioni(); updatePreview();
  });
  document.getElementById("btn-add-cond").addEventListener("click", function() { condizioni.push({label:"",valore:""}); renderCondizioni(); updatePreview(); });
  document.getElementById("btn-catalogo").addEventListener("click", showCatalogo);
  document.getElementById("btn-cat-back").addEventListener("click", function() { renderList(); });
  document.getElementById("btn-cat-nuovo").addEventListener("click", openCatNew);
  document.getElementById("cat-btn-salva").addEventListener("click", saveCatalogoProdotto);
  // RTE toolbar for catalogo
  document.querySelectorAll("#cat-rte-toolbar .rte-btn[data-cmd]").forEach(function(btn) {
    btn.addEventListener("mousedown", function(e) {
      e.preventDefault();
      document.execCommand(this.dataset.cmd, false, null);
    });
  });
  document.querySelectorAll("#cat-rte-toolbar .rte-color[data-color]").forEach(function(btn) {
    btn.addEventListener("mousedown", function(e) {
      e.preventDefault();
      document.execCommand("foreColor", false, this.dataset.color);
    });
  });
  document.getElementById("cat-btn-annulla").addEventListener("click", closeCatOverlay);
  document.getElementById("cat-btn-del").addEventListener("click", deleteCatalogoProdotto);
  document.getElementById("cat-overlay").addEventListener("click", function(e) { if(e.target===this) closeCatOverlay(); });
  document.getElementById("pick-annulla").addEventListener("click", function() { document.getElementById("pick-overlay").style.display="none"; pickSi=-1; pickVi=-1; });
  document.getElementById("pick-overlay").addEventListener("click", function(e) { if(e.target===this){ this.style.display="none"; pickSi=-1; pickVi=-1; } });
  document.getElementById("pick-search").addEventListener("input", function() { renderPickList(this.value); });
  document.getElementById("btn-s-bozza").addEventListener("click", function() { setStato("bozza"); });
  document.getElementById("btn-s-inviata").addEventListener("click", function() { setStato("inviata"); });
  document.getElementById("btn-s-accettata").addEventListener("click", function() { setStato("accettata"); });
  document.getElementById("btn-s-rifiutata").addEventListener("click", function() { setStato("rifiutata"); });
  document.getElementById("btn-s-annulla").addEventListener("click", closeStatoModal);
  document.getElementById("btn-s-elimina").addEventListener("click", deletePreventivo);
  document.getElementById("stato-overlay").addEventListener("click", function(e) { if(e.target===this) closeStatoModal(); });
  document.getElementById("search").addEventListener("input", renderList);
  document.getElementById("filter-stato").addEventListener("change", renderList);
  document.addEventListener("keydown", function(e) { if(e.key==="Escape"){ closeStatoModal(); document.getElementById("cat-overlay").style.display="none"; document.getElementById("pick-overlay").style.display="none"; } });

  loadAll();
})();
</script>
</body>
