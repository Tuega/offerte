<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuega - Preventivi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    /* Stili base e layout */
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    .editor-grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
    
    /* Area PDF (Anteprima) */
    #pdf-doc { 
        background: white; 
        padding: 40px; 
        width: 210mm; /* Larghezza A4 */
        min-height: 297mm; /* Altezza A4 */
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    
    /* Tabella PDF - Ottimizzata per non rompersi */
    .ptab { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .ptab th, .ptab td { border: 1px solid #ddd; padding: 8px; word-wrap: break-word; }
    .ptab th { background: #f5f5f5; }

    @media (max-width: 900px) { .editor-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="editor-grid">
    <div class="input-area">
        <h1>Editor Preventivo</h1>
        <button onclick="generatePDF()">Scarica PDF</button>
    </div>

    <div class="preview-area">
        <div id="pdf-doc">
            <h2>Preventivo</h2>
            <table class="ptab">
                <thead>
                    <tr>
                        <th>Descrizione</th>
                        <th>Prezzo</th>
                    </tr>
                </thead>
                <tbody id="pdf-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function generatePDF() {
        const element = document.getElementById('pdf-doc');
        
        // Configurazione pulita senza windowWidth
        const opt = {
            margin:       10,
            filename:     'preventivo.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
