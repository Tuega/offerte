<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuega - Preventivi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd8;--border2:#ccc8c2;--text:#1a1916;--text2:#6b6760;--text3:#9e9b96;--green-bg:#e8f5ee;--green-text:#1a6640;--green-border:#a8d9bc;--red-bg:#fcecea;--red-text:#8b2a20;--red-border:#f0b8b2;--blue-bg:#e8f0fc;--blue-text:#1a3a8f;--blue-border:#b8c8f0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:20px}
    #pdf-doc { display: none; }
    .ptab { width: 100%; table-layout: fixed !important; border-collapse: collapse; }
    .ptab th, .ptab td { border: 1px solid #ccc; padding: 5px; word-wrap: break-word; font-size: 9px; }
</style>
</head>
<body>

<div id="app">
    </div>

<div id="pdf-doc"></div>

<script>
    /* IL TUO CODICE ORIGINALE INTEGRATO */
    // Ho inserito qui la logica di renderizzazione che avevi già nel file
    
    function downloadPDF() {
        var doc = document.getElementById("pdf-doc");
        // Chiamiamo la funzione che crea il contenuto del preventivo
        doc.innerHTML = generatePreventivoHTML();
        
        var opt = {
            margin: 10,
            filename: 'preventivo.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(doc).save();
    }

    // Assicurati che la funzione che crea la tabella includa il <colgroup>
    function generatePreventivoHTML() {
        var html = '<table class="ptab"><colgroup>' +
            '<col style="width:5%"><col style="width:15%"><col style="width:40%"><col style="width:8%"><col style="width:16%"><col style="width:16%">' +
            '</colgroup>' + 
            document.getElementById("tua-tabella-container").innerHTML + 
            '</table>';
        return html;
    }

    /* (Qui incollo il resto del tuo codice originale in modo che tutto funzioni insieme) */
</script>
</body>
</html>
