    }

    // FUNZIONE DI DOWNLOAD RIPULITA
    function downloadPDF() {
        var doc = document.getElementById("pdf-doc");
        doc.innerHTML = buildPDF(); // Genera il contenuto
        
        var opt = {
            margin: 10,
            filename: 'preventivo.pdf',
            image: { type: 'jpeg', quality: 0.98 },

        };
        
        html2pdf().set(opt).from(doc).save();
