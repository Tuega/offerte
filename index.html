<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuega - Preventivi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ... (Mantieni tutti i tuoi stili originali) ... */
#pdf-doc{font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#222;background:#fff;padding:18px 22px;width:210mm;display:none;}
.ptab { width: 100%; table-layout: fixed !important; border-collapse: collapse; }
.ptab th, .ptab td { border: 1px solid #ccc; padding: 5px; word-wrap: break-word; font-size: 9px; }
</style>
</head>
<body>

<div id="pdf-doc"></div>

<script>
    // ... (Inserisci qui tutte le tue funzioni originali di logica) ...

    // FUNZIONE DI DOWNLOAD CORRETTA
    function downloadPDF() {
        var doc = document.getElementById("pdf-doc");
        // Assicurati che buildPDF() ritorni l'HTML della tabella corretta
        doc.innerHTML = buildPDF(); 
        
        var opt = {
            margin: 10,
            filename: 'preventivo.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(doc).save();
    }
</script>
</body>
</html>
