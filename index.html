<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anteprima Preventivo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        /* Il contenitore deve essere visibile e avere dimensioni */
        #pdf-doc { 
            background: white; 
            width: 210mm; 
            min-height: 297mm; 
            margin: 20px auto; 
            padding: 20px;
            border: 1px solid #ccc;
            overflow: hidden;
        }
        .controls { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="scaricaPDF()">Scarica PDF</button>
</div>

<div id="pdf-doc">
    <h1>Anteprima Preventivo</h1>
    <p>Se vedi questo testo, il contenitore funziona.</p>
</div>

<script>
    // Questa funzione carica il contenuto dentro il div
    function caricaAnteprima() {
        var doc = document.getElementById("pdf-doc");
        // Qui richiamiamo la tua funzione buildPDF che hai nel file
        if (typeof buildPDF === 'function') {
            doc.innerHTML = buildPDF();
        }
    }

    function scaricaPDF() {
        var element = document.getElementById('pdf-doc');
        html2pdf().from(element).save('preventivo.pdf');
    }

    // Carica l'anteprima appena la pagina è pronta
    window.onload = caricaAnteprima;
</script>
</body>
</html>
