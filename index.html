<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuega - Preventivi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    /* Inserisci qui il tuo CSS originale che avevi nel file */
    /* Assicuriamoci che l'anteprima sia visibile */
    #pdf-doc { width: 100%; display: block !important; }
    
    /* Correzione tabella PDF per non farla sballare */
    .ptab { width: 100%; table-layout: fixed !important; border-collapse: collapse; }
    .ptab th, .ptab td { border: 1px solid #ccc; padding: 5px; word-wrap: break-word; font-size: 9px; }
    
    @media print {
        #pdf-doc { width: 210mm; }
    }
</style>
</head>
<body>

<div id="pdf-doc"></div>

<script>
    // 1. INCOLLA QUI SOTTO TUTTE LE TUE FUNZIONI ORIGINALI (buildPDF, ecc.)
    // Assicurati che buildPDF abbia il COLGROUP corretto che ti ho dato:
    // <table class="ptab"><colgroup>
    //   <col style="width:5%"><col style="width:15%"><col style="width:40%"><col style="width:8%"><col style="width:16%"><col style="width:16%">
    // </colgroup>...

    // 2. FUNZIONE DI DOWNLOAD CORRETTA (Sostituisci la tua vecchia con questa)
    function downloadPDF() {
        var element = document.getElementById('pdf-doc');
        element.innerHTML = buildPDF(); // Aggiorna l'anteprima prima di salvare
        
        var opt = {
            margin: 10,
            filename: 'preventivo.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true }, // Rimosso windowWidth
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
